<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deep Horizon — Live Dashboard</title>
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #09090b; color: #e4e4e7; }

    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 24px; border-bottom: 1px solid #27272a; background: #0a0a0a;
    }
    .header h1 { font-size: 18px; font-weight: 700; }
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; padding: 4px 10px; border-radius: 20px;
    }
    .badge.live { background: #22c55e20; color: #22c55e; }
    .badge.off { background: #3f3f4640; color: #71717a; }
    .conn-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
    .conn-dot.on { background: #22c55e; box-shadow: 0 0 6px #22c55e80; }
    .conn-dot.off { background: #ef4444; }

    .tabs {
      display: flex; gap: 0; border-bottom: 1px solid #27272a; background: #0a0a0a;
    }
    .tab {
      padding: 10px 24px; font-size: 13px; font-weight: 600; cursor: pointer;
      color: #71717a; border-bottom: 2px solid transparent; transition: all 0.2s;
      background: none; border-top: none; border-left: none; border-right: none;
    }
    .tab:hover { color: #a1a1aa; }
    .tab.active { color: #e4e4e7; border-bottom-color: #22c55e; }

    .content { padding: 20px 24px; }
    .empty { text-align: center; padding: 60px 20px; color: #52525b; font-size: 14px; }

    .user-card {
      background: #18181b; border: 1px solid #27272a; border-radius: 12px;
      margin-bottom: 16px; overflow: hidden;
    }
    .user-card-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px; border-bottom: 1px solid #27272a;
    }
    .user-info { display: flex; align-items: center; gap: 12px; }
    .user-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700;
    }
    .avatar-live { background: #22c55e20; color: #22c55e; }
    .avatar-history { background: #3b82f620; color: #3b82f6; }
    .user-name { font-size: 14px; font-weight: 600; }
    .user-id { font-size: 11px; color: #71717a; font-family: monospace; }

    .map-container { height: 300px; position: relative; }
    .map-container .leaflet-container { height: 100%; width: 100%; }

    .stats-bar {
      display: flex; gap: 20px; padding: 12px 18px;
      background: #111113; border-top: 1px solid #27272a;
    }
    .stat { display: flex; flex-direction: column; gap: 2px; }
    .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: #52525b; }
    .stat-value { font-size: 13px; font-family: monospace; color: #a1a1aa; }
    .stat-value.speed { color: #22c55e; font-weight: 600; }

    .session-list { padding: 0 18px 14px; }
    .session-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 0; border-bottom: 1px solid #1e1e21; cursor: pointer;
    }
    .session-row:hover { background: #1a1a1d; margin: 0 -18px; padding: 10px 18px; border-radius: 6px; border-color: transparent; }
    .session-name { font-size: 13px; font-weight: 600; color: #e4e4e7; }
    .session-detail { font-size: 11px; color: #71717a; }
    .session-expand-btn {
      background: #27272a; border: none; color: #a1a1aa; font-size: 11px;
      padding: 4px 10px; border-radius: 6px; cursor: pointer;
    }
    .session-expand-btn:hover { background: #3f3f46; color: #e4e4e7; }

    .pulse-dot {
      width: 12px; height: 12px; border-radius: 50%; background: #22c55e;
      box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
      70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
      100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
    }

    .details-panel {
      padding: 12px 18px; background: #111113; border-top: 1px solid #27272a;
    }
    .details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .details-stats {
      display: flex; gap: 24px; margin-top: 12px; padding-top: 10px;
      border-top: 1px solid #1e1e21;
    }
    .detail-dot {
      width: 8px; height: 8px; border-radius: 50%; margin-top: 4px; flex-shrink: 0;
    }
    .load-more-btn {
      background: #27272a; border: none; color: #a1a1aa; font-size: 13px;
      padding: 8px 24px; border-radius: 8px; cursor: pointer;
    }
    .load-more-btn:hover { background: #3f3f46; color: #e4e4e7; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;
    const BASE = window.location.origin;

    // ═══════════════════════════════════════════════════════════
    //  HELPERS
    // ═══════════════════════════════════════════════════════════
    function haversine(lat1, lng1, lat2, lng2) {
      const R = 6371000;
      const toRad = d => d * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLng = toRad(lng2 - lng1);
      const a = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function formatDistance(m) {
      return m < 1000 ? `${Math.round(m)} m` : `${(m / 1000).toFixed(2)} km`;
    }

    function formatDuration(secs) {
      if (secs < 60) return `${secs}s`;
      if (secs < 3600) return `${Math.floor(secs / 60)}m ${secs % 60}s`;
      return `${Math.floor(secs / 3600)}h ${Math.floor((secs % 3600) / 60)}m`;
    }

    function timeAgo(iso) {
      const diff = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
      if (diff < 10) return 'Just now';
      if (diff < 60) return `${diff}s ago`;
      if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
      return `${Math.floor(diff / 3600)}h ago`;
    }

    // Geocode cache + queue (Nominatim 1 req/sec)
    const geocodeCache = {};
    const geocodeQueue = [];
    let geocodeRunning = false;

    function reverseGeocode(lat, lng) {
      const key = `${lat.toFixed(3)},${lng.toFixed(3)}`;
      if (geocodeCache[key]) return Promise.resolve(geocodeCache[key]);
      return new Promise(resolve => {
        geocodeQueue.push({ lat, lng, key, resolve });
        processGeocodeQueue();
      });
    }

    async function processGeocodeQueue() {
      if (geocodeRunning || geocodeQueue.length === 0) return;
      geocodeRunning = true;
      while (geocodeQueue.length > 0) {
        const { lat, lng, key, resolve } = geocodeQueue.shift();
        if (geocodeCache[key]) { resolve(geocodeCache[key]); continue; }
        try {
          const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&zoom=16&addressdetails=1`, {
            headers: { 'Accept-Language': 'en' },
          });
          const data = await res.json();
          let place = '\u2014';
          if (data.address) {
            const a = data.address;
            place = a.road || a.neighbourhood || a.suburb || a.city_district || data.display_name?.split(',').slice(0, 2).join(',') || '\u2014';
          }
          geocodeCache[key] = place;
          resolve(place);
        } catch { resolve('\u2014'); }
        if (geocodeQueue.length > 0) await new Promise(r => setTimeout(r, 1000));
      }
      geocodeRunning = false;
    }

    // ═══════════════════════════════════════════════════════════
    //  SOCKET HOOK — single global connection
    // ═══════════════════════════════════════════════════════════
    const socket = io(BASE, { transports: ['websocket', 'polling'] });

    function useSocket() {
      const [connected, setConnected] = useState(socket.connected);

      useEffect(() => {
        const onConnect = () => setConnected(true);
        const onDisconnect = () => setConnected(false);
        socket.on('connect', onConnect);
        socket.on('disconnect', onDisconnect);
        return () => {
          socket.off('connect', onConnect);
          socket.off('disconnect', onDisconnect);
        };
      }, []);

      return connected;
    }

    // ═══════════════════════════════════════════════════════════
    //  LEAFLET MAP COMPONENT (imperative — Leaflet needs DOM)
    // ═══════════════════════════════════════════════════════════
    function LeafletMap({ userId, lat, lng, trail }) {
      const containerRef = useRef(null);
      const mapRef = useRef(null);
      const markerRef = useRef(null);
      const trailLineRef = useRef(null);
      const trailDotsRef = useRef([]);

      // Init map once
      useEffect(() => {
        if (!containerRef.current || mapRef.current) return;
        const map = L.map(containerRef.current, { zoomControl: false }).setView([lat || 26.14, lng || 91.73], 16);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '\u00a9 OpenStreetMap',
        }).addTo(map);

        const pulseIcon = L.divIcon({
          className: '',
          html: `<div style="position:relative;width:20px;height:20px">
            <div style="position:absolute;inset:0;border-radius:50%;background:rgba(34,197,94,0.3);animation:pulse 2s infinite"></div>
            <div style="position:absolute;top:4px;left:4px;width:12px;height:12px;border-radius:50%;background:#22c55e;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.3)"></div>
          </div>`,
          iconSize: [20, 20], iconAnchor: [10, 10],
        });

        markerRef.current = L.marker([lat || 26.14, lng || 91.73], { icon: pulseIcon }).addTo(map);
        trailLineRef.current = L.polyline([], { color: '#3b82f6', weight: 3, opacity: 0.7 }).addTo(map);
        mapRef.current = map;

        return () => { map.remove(); mapRef.current = null; };
      }, []);

      // Update marker + trail on new data
      useEffect(() => {
        if (!mapRef.current || !lat || !lng) return;
        markerRef.current.setLatLng([lat, lng]);
        mapRef.current.setView([lat, lng], mapRef.current.getZoom());

        if (trail && trail.length > 0) {
          trailLineRef.current.setLatLngs(trail);
          // Add trail dot
          const dot = L.circleMarker([lat, lng], {
            radius: 3, fillColor: '#3b82f6', fillOpacity: 0.6,
            color: '#3b82f6', weight: 0.5, opacity: 0.4,
          }).addTo(mapRef.current);
          trailDotsRef.current.push(dot);
          if (trailDotsRef.current.length > 500) {
            mapRef.current.removeLayer(trailDotsRef.current.shift());
          }
        }
      }, [lat, lng, trail?.length]);

      return <div ref={containerRef} style={{ height: 300, width: '100%' }} />;
    }

    // ═══════════════════════════════════════════════════════════
    //  LIVE USER CARD
    // ═══════════════════════════════════════════════════════════
    function LiveUserCard({ userId, data, trail }) {
      const initials = userId.slice(0, 2).toUpperCase();
      const speedKmh = (data.speed != null && data.speed >= 0) ? (data.speed * 3.6).toFixed(1) : '0.0';

      return (
        <div className="user-card">
          <div className="user-card-header">
            <div className="user-info">
              <div className="user-avatar avatar-live">{initials}</div>
              <div>
                <div className="user-name">{userId}</div>
                <div className="user-id">Live tracking</div>
              </div>
            </div>
            <div className="pulse-dot" />
          </div>
          <div className="map-container">
            <LeafletMap userId={userId} lat={data.lat} lng={data.lng} trail={trail} />
          </div>
          <div className="stats-bar">
            <div className="stat"><span className="stat-label">Latitude</span><span className="stat-value">{data.lat?.toFixed(6)}</span></div>
            <div className="stat"><span className="stat-label">Longitude</span><span className="stat-value">{data.lng?.toFixed(6)}</span></div>
            <div className="stat"><span className="stat-label">Speed</span><span className="stat-value speed">{speedKmh} km/h</span></div>
            <div className="stat"><span className="stat-label">Points</span><span className="stat-value">{trail.length}</span></div>
            <div className="stat"><span className="stat-label">Last Update</span><span className="stat-value">{timeAgo(data.timestamp)}</span></div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════
    //  SESSION DETAILS (expandable)
    // ═══════════════════════════════════════════════════════════
    function SessionDetails({ sessionId }) {
      const [details, setDetails] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        let cancelled = false;
        (async () => {
          try {
            const res = await fetch(`${BASE}/session/${sessionId}/logs`);
            const data = await res.json();
            const logs = data.data || [];
            if (cancelled) return;

            if (logs.length === 0) {
              setDetails({ empty: true });
              setLoading(false);
              return;
            }

            let totalDistance = 0;
            const speeds = [];
            for (let i = 1; i < logs.length; i++) {
              const dist = haversine(logs[i - 1].lat, logs[i - 1].lng, logs[i].lat, logs[i].lng);
              totalDistance += dist;
              const dt = (new Date(logs[i].recorded_at) - new Date(logs[i - 1].recorded_at)) / 1000;
              if (dt > 0 && dist > 1) speeds.push((dist / dt) * 3.6);
            }

            const avgSpeed = speeds.length > 0 ? (speeds.reduce((a, b) => a + b, 0) / speeds.length).toFixed(1) : '0.0';
            const maxSpeed = speeds.length > 0 ? Math.max(...speeds).toFixed(1) : '0.0';
            const first = logs[0];
            const last = logs[logs.length - 1];

            const [startPlace, endPlace] = await Promise.all([
              reverseGeocode(first.lat, first.lng),
              reverseGeocode(last.lat, last.lng),
            ]);

            if (!cancelled) {
              setDetails({
                startPlace, endPlace,
                startTime: new Date(first.recorded_at).toLocaleTimeString(),
                endTime: new Date(last.recorded_at).toLocaleTimeString(),
                startCoords: `${first.lat.toFixed(6)}, ${first.lng.toFixed(6)}`,
                endCoords: `${last.lat.toFixed(6)}, ${last.lng.toFixed(6)}`,
                totalDistance, avgSpeed, maxSpeed, points: logs.length,
              });
              setLoading(false);
            }
          } catch {
            if (!cancelled) { setDetails({ error: true }); setLoading(false); }
          }
        })();
        return () => { cancelled = true; };
      }, [sessionId]);

      if (loading) return <div className="details-panel" style={{ color: '#52525b', fontSize: 12 }}>Loading...</div>;
      if (details?.error) return <div className="details-panel" style={{ color: '#ef4444', fontSize: 12 }}>Failed to load</div>;
      if (details?.empty) return <div className="details-panel" style={{ color: '#52525b', fontSize: 12 }}>No location data</div>;

      return (
        <div className="details-panel">
          <div className="details-grid">
            <div style={{ display: 'flex', alignItems: 'flex-start', gap: 8 }}>
              <div className="detail-dot" style={{ background: '#22c55e' }} />
              <div>
                <div style={{ fontSize: 10, textTransform: 'uppercase', color: '#52525b', letterSpacing: '0.05em' }}>Start</div>
                <div style={{ fontSize: 13, color: '#e4e4e7', fontWeight: 600 }}>{details.startPlace}</div>
                <div style={{ fontSize: 11, color: '#71717a', fontFamily: 'monospace' }}>{details.startTime} &middot; {details.startCoords}</div>
              </div>
            </div>
            <div style={{ display: 'flex', alignItems: 'flex-start', gap: 8 }}>
              <div className="detail-dot" style={{ background: '#ef4444' }} />
              <div>
                <div style={{ fontSize: 10, textTransform: 'uppercase', color: '#52525b', letterSpacing: '0.05em' }}>End</div>
                <div style={{ fontSize: 13, color: '#e4e4e7', fontWeight: 600 }}>{details.endPlace}</div>
                <div style={{ fontSize: 11, color: '#71717a', fontFamily: 'monospace' }}>{details.endTime} &middot; {details.endCoords}</div>
              </div>
            </div>
          </div>
          <div className="details-stats">
            <div>
              <div style={{ fontSize: 10, textTransform: 'uppercase', color: '#52525b', letterSpacing: '0.05em' }}>Total Distance</div>
              <div style={{ fontSize: 14, color: '#3b82f6', fontWeight: 700, fontFamily: 'monospace' }}>{formatDistance(details.totalDistance)}</div>
            </div>
            <div>
              <div style={{ fontSize: 10, textTransform: 'uppercase', color: '#52525b', letterSpacing: '0.05em' }}>Avg Speed</div>
              <div style={{ fontSize: 14, color: '#a1a1aa', fontWeight: 600, fontFamily: 'monospace' }}>{details.avgSpeed} km/h</div>
            </div>
            <div>
              <div style={{ fontSize: 10, textTransform: 'uppercase', color: '#52525b', letterSpacing: '0.05em' }}>Max Speed</div>
              <div style={{ fontSize: 14, color: '#a1a1aa', fontWeight: 600, fontFamily: 'monospace' }}>{details.maxSpeed} km/h</div>
            </div>
            <div>
              <div style={{ fontSize: 10, textTransform: 'uppercase', color: '#52525b', letterSpacing: '0.05em' }}>Points</div>
              <div style={{ fontSize: 14, color: '#a1a1aa', fontWeight: 600, fontFamily: 'monospace' }}>{details.points}</div>
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════
    //  SESSION ROW
    // ═══════════════════════════════════════════════════════════
    function SessionRow({ session }) {
      const [expanded, setExpanded] = useState(false);
      return (
        <>
          <div className="session-row" onClick={() => setExpanded(!expanded)}>
            <div style={{ flex: 1 }}>
              <div className="session-name">
                {session.session_name} <span style={{ color: '#52525b', fontWeight: 400, fontSize: 11 }}>({session.user_id})</span>
              </div>
              <div className="session-detail">
                {new Date(session.started_at).toLocaleString()} &middot; {formatDuration(session.duration_secs)} &middot; {session.total_pings} points
              </div>
            </div>
            <button className="session-expand-btn">{expanded ? 'Hide' : 'Details'}</button>
          </div>
          {expanded && <SessionDetails sessionId={session.id} />}
        </>
      );
    }

    // ═══════════════════════════════════════════════════════════
    //  HISTORY TAB
    // ═══════════════════════════════════════════════════════════
    function HistoryTab({ refreshKey }) {
      const [sessions, setSessions] = useState([]);
      const [page, setPage] = useState(1);
      const [totalPages, setTotalPages] = useState(1);
      const [total, setTotal] = useState(0);
      const [loading, setLoading] = useState(false);

      const loadPage = useCallback(async (p) => {
        if (loading) return;
        setLoading(true);
        try {
          const res = await fetch(`${BASE}/sessions/all?page=${p}&limit=20`);
          const data = await res.json();
          if (data.ok) {
            if (p === 1) {
              setSessions(data.data);
            } else {
              setSessions(prev => [...prev, ...data.data]);
            }
            setPage(p);
            setTotalPages(data.totalPages);
            setTotal(data.total);
          }
        } catch (err) {
          console.error('Failed to load history:', err);
        }
        setLoading(false);
      }, [loading]);

      // Reload page 1 whenever refreshKey changes (session stopped)
      useEffect(() => {
        loadPage(1);
      }, [refreshKey]);

      // Group sessions by user
      const grouped = useMemo(() => {
        const g = {};
        sessions.forEach(s => {
          if (!g[s.user_id]) g[s.user_id] = [];
          g[s.user_id].push(s);
        });
        return g;
      }, [sessions]);

      if (sessions.length === 0 && !loading) {
        return <div className="empty">No session history yet</div>;
      }

      return (
        <>
          {Object.entries(grouped).map(([userId, userSessions]) => (
            <div className="user-card" key={userId}>
              <div className="user-card-header">
                <div className="user-info">
                  <div className="user-avatar avatar-history">{userId.slice(0, 2).toUpperCase()}</div>
                  <div>
                    <div className="user-name">{userId}</div>
                    <div className="user-id">Sessions</div>
                  </div>
                </div>
              </div>
              <div className="session-list">
                {userSessions.map(s => <SessionRow key={s.id} session={s} />)}
              </div>
            </div>
          ))}
          {page < totalPages && (
            <div style={{ textAlign: 'center', padding: 16 }}>
              <button className="load-more-btn" onClick={() => loadPage(page + 1)} disabled={loading}>
                {loading ? 'Loading...' : 'Load More'}
              </button>
              <div style={{ fontSize: 11, color: '#52525b', marginTop: 6 }}>
                Page {page} of {totalPages} ({total} sessions)
              </div>
            </div>
          )}
        </>
      );
    }

    // ═══════════════════════════════════════════════════════════
    //  APP — top-level state + socket listeners
    // ═══════════════════════════════════════════════════════════
    function App() {
      const connected = useSocket();
      const [tab, setTab] = useState('live');
      const [liveUsers, setLiveUsers] = useState({});   // userId → { data, trail: [[lat,lng], ...] }
      const [historyKey, setHistoryKey] = useState(0);   // increment to trigger history reload

      // Socket: real-time location updates
      useEffect(() => {
        const handler = (data) => {
          if (data.stopped) {
            // Remove from live, refresh history
            setLiveUsers(prev => {
              const next = { ...prev };
              delete next[data.userId];
              return next;
            });
            setHistoryKey(k => k + 1);
            return;
          }

          setLiveUsers(prev => {
            const existing = prev[data.userId];
            const trail = existing ? [...existing.trail, [data.lat, data.lng]] : [[data.lat, data.lng]];
            // Cap trail at 500 points
            if (trail.length > 500) trail.shift();
            return { ...prev, [data.userId]: { data, trail } };
          });
        };

        socket.on('locationUpdate', handler);
        return () => socket.off('locationUpdate', handler);
      }, []);

      // Load active users on mount
      useEffect(() => {
        (async () => {
          let cursor = '0';
          try {
            do {
              const res = await fetch(`${BASE}/users/active?cursor=${cursor}&limit=50`);
              const data = await res.json();
              if (data.ok && data.data.length > 0) {
                setLiveUsers(prev => {
                  const next = { ...prev };
                  data.data.forEach(u => {
                    const existing = next[u.userId];
                    const trail = existing ? [...existing.trail, [u.lat, u.lng]] : [[u.lat, u.lng]];
                    next[u.userId] = { data: u, trail };
                  });
                  return next;
                });
              }
              cursor = data.cursor || '0';
            } while (cursor !== '0');
          } catch (err) {
            console.error('Failed to load active users:', err);
          }
        })();
      }, []);

      const liveCount = Object.keys(liveUsers).length;

      return (
        <>
          {/* Header */}
          <div className="header">
            <h1>Deep Horizon — Live Dashboard</h1>
            <span className={`badge ${connected ? 'live' : 'off'}`}>
              <span className={`conn-dot ${connected ? 'on' : 'off'}`} />
              {connected ? 'Connected' : 'Disconnected'}
            </span>
          </div>

          {/* Tabs */}
          <div className="tabs">
            <button className={`tab ${tab === 'live' ? 'active' : ''}`} onClick={() => setTab('live')}>
              Live Tracking {liveCount > 0 && <span style={{ marginLeft: 4, color: '#22c55e' }}>({liveCount})</span>}
            </button>
            <button className={`tab ${tab === 'history' ? 'active' : ''}`} onClick={() => setTab('history')}>
              History
            </button>
          </div>

          {/* Content */}
          <div className="content">
            {tab === 'live' && (
              liveCount === 0
                ? <div className="empty">No users being tracked right now</div>
                : Object.entries(liveUsers).map(([userId, { data, trail }]) => (
                    <LiveUserCard key={userId} userId={userId} data={data} trail={trail} />
                  ))
            )}
            {tab === 'history' && <HistoryTab refreshKey={historyKey} />}
          </div>
        </>
      );
    }

    // ── Mount ──
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
